[module/xworkspaces]
type = internal/xworkspaces

label-active = %icon%
label-active-background = ${colors.shade-2}
label-active-padding = 1

label-occupied = %icon%
; label-occupied-background = ${colors.shade-1}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

; xprop -root _NET_DESKTOP_NAMES
; _NET_DESKTOP_NAMES(UTF8_STRING) = "1", "2", "3", "4"

icon-0 = 1;1 ­¤śĆ
icon-1 = 2;2 ­¤É▒
icon-2 = 3;3 ­¤śĀ
icon-3 = 4;4 ­¤żō
icon-default = ­¤ś¢

enable-click = true

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

; format-volume-prefix = "’Ć” "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%% ’Ć”

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.primary}
label = %gb_used:2%
; format-background = ${colors.secondary}
; format-padding = 5px

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
; label-connected = %{F#F0C674}%ifname%%{F-} %essid%
label-connected = ’ć½ %essid:0:2%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery
poll-interval = 2
format-charging = <label-charging> <ramp-capacity>
format-discharging = <label-discharging> <ramp-capacity>
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
label-charging = " %percentage%% ’ć” "
label-charging-background = #2b4600
; ramp-capacity-background = #4b8510
label-discharging = %percentage%
label-full = ’ēĆ
low-at = 10
label-low = low
battery = BAT1
adapter = ADP1

[module/cpu-temp]
type = custom/script
interval = 5
format = <label> <ramp-coreload>
exec = echo "$(sensors | grep "Package" | awk '{print $4}' | cut -d '.' -f 1)┬░C"
ramp-coreload-spacing = 1
ramp-coreload-0 = Ō¢ü
ramp-coreload-1 = Ō¢é
ramp-coreload-2 = Ō¢ā
ramp-coreload-3 = Ō¢ä
ramp-coreload-4 = Ō¢ģ
ramp-coreload-5 = Ō¢å
ramp-coreload-6 = Ō¢ć
ramp-coreload-7 = Ō¢ł

