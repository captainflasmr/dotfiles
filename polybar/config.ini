include-file = /home/jdyer/.config/polybar/modules.ini
include-file = /home/jdyer/.config/polybar/colors.ini

[bar/mine]
width = 100%
height = 32pt
radius = 8

include-file = /home/jdyer/.config/polybar/fonts.ini

background = ${colors.background}
foreground = ${colors.foreground}
background-0 = ${colors.background}
background-1 = ${colors.background}

line-size = 3pt

border-size = 4px
border-color = #22ffffff

padding-left = 15px
padding-right = 15px

module-margin = 10px

separator =
separator-foreground = ${colors.disabled}

modules-left = pulseaudio backlight browser files terminal xworkspaces
modules-center = xwindow
modules-right = cpu memory cpu-temp wlan keyboard battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-offset-x = 0
tray-offset-y = 0
tray-position = none

fixed-center = true